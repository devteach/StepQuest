<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepQuest 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a2e;--paper:#faf8f2;--paper2:#f0ede3;--accent:#c8392b;--accent2:#2e6da4;--gold:#c9841a;--green:#2d7a4f;--border:rgba(26,26,46,0.15);--fh:'Gowun Dodum',serif;--fb:'Noto Sans KR',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--fb);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(26,26,46,.06) 39px,rgba(26,26,46,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(26,26,46,.06) 39px,rgba(26,26,46,.06) 40px)}
  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:16px}
  .app-header{text-align:center;padding:24px 0 18px;border-bottom:2px solid var(--ink);margin-bottom:20px}
  .app-header h1{font-family:var(--fh);font-size:20px}
  .app-header .sub{font-size:12px;color:rgba(26,26,46,.5);margin-top:4px}
  .tabs{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
  .tab-btn{flex:1;padding:10px 4px;font-size:13px;font-weight:700;font-family:var(--fb);border:none;background:transparent;cursor:pointer;color:rgba(26,26,46,.45);border-right:1px solid var(--border);transition:background .15s,color .15s}
  .tab-btn:last-child{border-right:none}
  .tab-btn.active{background:var(--ink);color:var(--paper)}
  .card{background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
  .card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .card-meta h3{font-size:14px;font-weight:700;margin-bottom:2px}
  .card-meta p{font-size:12px;color:rgba(26,26,46,.55)}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .b-wait{background:#fff3cd;color:#7d5a00}
  .b-ok{background:#d4edda;color:#1a5c2a}
  .b-rej{background:#fde8e8;color:#8b1a1a}
  .photo-box{width:100%;border-radius:8px;aspect-ratio:4/3;object-fit:cover;background:var(--paper2);border:1px solid var(--border);display:block;cursor:pointer}
  .action-row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--fb);cursor:pointer;transition:opacity .15s}
  .btn:active{opacity:.8}
  .btn-success{background:var(--green);color:#fff}
  .btn-danger{background:var(--accent);color:#fff}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);flex:unset;padding:7px 14px;font-size:12px}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .reject-section{display:none;margin-top:10px}
  .reject-section textarea{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);background:var(--paper);color:var(--ink);resize:none}
  .reject-section button{margin-top:8px;width:100%}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .stat{background:var(--paper2);border-radius:10px;padding:14px 10px;text-align:center}
  .stat-num{font-size:28px;font-weight:700}
  .stat-label{font-size:11px;color:rgba(26,26,46,.5);margin-top:3px}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:10px;text-align:left;font-weight:700;font-size:11px;color:rgba(26,26,46,.5);border-bottom:1.5px solid var(--border);letter-spacing:.5px}
  td{padding:10px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  .cell-c{text-align:center;font-size:15px}
  .me-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .me-row:last-child{border-bottom:none}
  .me-icon{font-size:20px}
  .me-info{flex:1}
  .me-title{font-size:14px;font-weight:700}
  .me-sub{font-size:11px;color:rgba(26,26,46,.5);margin-top:2px}
  .form-card{background:#eef3fb;border:1.5px solid var(--accent2);border-radius:12px;padding:16px;margin-bottom:12px}
  .form-card h4{font-size:14px;color:var(--accent2);margin-bottom:14px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:.5px}
  .field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);background:var(--paper);color:var(--ink)}
  .field textarea{resize:vertical}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-actions{display:flex;gap:8px;margin-top:12px}

  /* 학생 계정 섹션 */
  .student-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .student-row:last-child{border-bottom:none}
  .s-info{flex:1}
  .s-name{font-size:14px;font-weight:700}
  .s-email{font-size:11px;color:rgba(26,26,46,.5);margin-top:1px}
  .s-team{font-size:11px;background:#e8f0fb;color:var(--accent2);padding:2px 8px;border-radius:12px;display:inline-block;margin-top:3px}

  .login-wrap{max-width:360px;margin:60px auto 0}
  .login-wrap h2{font-family:var(--fh);font-size:18px;text-align:center;margin-bottom:20px}
  .login-wrap .field{margin-bottom:10px}
  .login-wrap .field label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;letter-spacing:.5px;color:rgba(26,26,46,.6)}
  .login-wrap input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--paper);color:var(--ink);font-family:var(--fb)}
  .login-wrap input:focus{outline:none;border-color:var(--ink)}
  .err{font-size:12px;color:var(--accent);text-align:center;min-height:18px}

  .loading{position:fixed;inset:0;z-index:100;background:rgba(250,248,242,.88);display:none;align-items:center;justify-content:center;font-size:14px;gap:10px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:32px;font-size:14px;color:rgba(26,26,46,.4)}
  .screen{display:none}
  .screen.active{display:block}
  .tab-pane{display:none}
  .tab-pane.active{display:block}
  .photo-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:20px}
  .photo-modal.show{display:flex}
  .photo-modal img{max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain}
  .photo-modal .close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 비밀번호 표시 박스 */
  .pw-display{background:#fff8e6;border:1.5px solid var(--gold);border-radius:8px;padding:12px 16px;margin-top:12px;display:none}
  .pw-display p{font-size:12px;color:rgba(26,26,46,.6);margin-bottom:4px}
  .pw-display .pw-val{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <span style="font-size:36px;display:block;margin-bottom:6px">📋</span>
    <h1>StepQuest 관리자</h1>
    <p class="sub">선생님 전용 페이지</p>
  </header>

  <!-- 관리자 로그인 -->
  <div id="screen-admin-login" class="screen active">
    <div class="login-wrap">
      <h2>🔐 관리자 로그인</h2>
      <div class="field"><label>이메일</label>
        <input id="admin-email" type="email" placeholder="teacher@school.kr" autocomplete="email">
      </div>
      <div class="field" style="margin-top:10px"><label>비밀번호</label>
        <input id="admin-pw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <p class="err" id="admin-err"></p>
      <button class="btn btn-primary" style="width:100%;padding:13px;margin-top:4px" onclick="adminLogin()">로그인</button>
    </div>
  </div>

  <!-- 관리자 메인 -->
  <div id="screen-admin-main" class="screen">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('review')">📷 제출 확인</button>
      <button class="tab-btn" onclick="switchTab('students')">👤 학생 계정</button>
      <button class="tab-btn" onclick="switchTab('dashboard')">📊 현황</button>
      <button class="tab-btn" onclick="switchTab('missions')">✏️ 미션</button>
    </div>
    <div style="text-align:right;margin-bottom:12px">
      <button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="adminLogout()">로그아웃</button>
    </div>

    <!-- 제출 확인 -->
    <div id="tab-review" class="tab-pane active">
      <div id="pending-list"><p class="empty">불러오는 중...</p></div>
    </div>

    <!-- 학생 계정 관리 -->
    <div id="tab-students" class="tab-pane">
      <div id="student-form-wrap"></div>
      <div class="card" style="padding:0;overflow:hidden" id="student-list-card">
        <div id="student-rows"><p class="empty">불러오는 중...</p></div>
      </div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;padding:13px" onclick="openStudentForm()">+ 학생 계정 추가</button>
    </div>

    <!-- 현황 대시보드 -->
    <div id="tab-dashboard" class="tab-pane">
      <div class="stats-grid" id="dash-stats"></div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="tbl-wrap"><table><thead><tr id="dash-thead"></tr></thead><tbody id="dash-tbody"></tbody></table></div>
      </div>
    </div>

    <!-- 미션 편집 -->
    <div id="tab-missions" class="tab-pane">
      <div id="mission-form-wrap"></div>
      <div class="card" style="padding:0;overflow:hidden"><div id="mission-rows"></div></div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;padding:13px" onclick="openMissionForm(null)">+ 미션 추가</button>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><span id="lmsg">잠시만요...</span></div>
<div class="toast" id="toast"></div>
<div class="photo-modal" id="photo-modal" onclick="closePhoto()">
  <span class="close">✕</span><img id="modal-img" src="">
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,collection,doc,getDocs,getDoc,addDoc,updateDoc,deleteDoc,onSnapshot,query,where,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import{getFunctions,httpsCallable}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

/* ★ Firebase 설정을 본인 것으로 교체하세요 ★ */
const firebaseConfig={apiKey:"AIzaSyCVuWl_431EoKCnsjYId1aauxlWBrM9g8M",authDomain:"devteach1225.firebaseapp.com",projectId:"devteach1225",storageBucket:"devteach1225.appspot.com",messagingSenderId:"987549318245",appId:"1:987549318245:web:9aa42b0663dc93408b1a8c"};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const functions=getFunctions(app,'asia-northeast3');

/* ── 헬퍼 ── */
const $=id=>document.getElementById(id);
let missions=[],students=[],teams=[],allSubs=[];
const showLoading=(m='')=>{$('loading').style.display='flex';$('lmsg').textContent=m||'잠시만요...'};
const hideLoading=()=>$('loading').style.display='none';
const toast=(msg,d=2400)=>{const e=$('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),d)};
const tsStr=ts=>{if(!ts)return'-';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleString('ko',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})};

/* ── Auth 상태 감시 — 자동 로그인 ── */
onAuthStateChanged(auth, async user => {
  if(user){
    const isAdmin = await checkAdmin(user.uid);
    if(isAdmin){
      $('screen-admin-login').classList.remove('active');
      $('screen-admin-main').classList.add('active');
      loadAdmin();
    } else {
      await signOut(auth);
      $('admin-err').textContent='관리자 권한이 없는 계정이에요.';
    }
  }
});

async function checkAdmin(uid){
  try{
    const snap = await getDoc(doc(db,'admins',uid));
    return snap.exists();
  }catch(e){ return false; }
}

window.adminLogin=async function(){
  const email=$('admin-email').value.trim();
  const pw=$('admin-pw').value;
  $('admin-err').textContent='';
  if(!email||!pw){$('admin-err').textContent='이메일과 비밀번호를 입력해 주세요.';return;}
  showLoading('로그인 중...');
  try{
    await signInWithEmailAndPassword(auth,email,pw);
    // onAuthStateChanged 가 자동으로 관리자 확인 후 진입
  }catch(e){
    hideLoading();
    const m={
      'auth/user-not-found':'등록되지 않은 이메일이에요.',
      'auth/wrong-password':'비밀번호가 틀렸어요.',
      'auth/invalid-credential':'이메일 또는 비밀번호를 확인해 주세요.',
      'auth/too-many-requests':'잠시 후 다시 시도해 주세요.'
    };
    $('admin-err').textContent=m[e.code]||'로그인 실패. 다시 시도해 주세요.';
  }
};

async function loadAdmin(){
  showLoading('데이터 불러오는 중...');
  try{
    const[mSnap,sSnap,tSnap]=await Promise.all([
      getDocs(query(collection(db,'missions'),orderBy('order'))),
      getDocs(collection(db,'users')),
      getDocs(collection(db,'teams'))
    ]);
    missions=mSnap.docs.map(d=>({id:d.id,...d.data()}));
    students=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    teams=tSnap.docs.map(d=>({id:d.id,...d.data()}));

    renderStudentRows();
    renderMissionRows();

    onSnapshot(query(collection(db,'submissions'),orderBy('createdAt','desc')),snap=>{
      allSubs=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPending();renderDashboard();
    });
    hideLoading();
  }catch(e){hideLoading();toast('불러오기 실패');console.error(e);}
}

/* ── 탭 전환 ── */
window.switchTab=name=>{
  const names=['review','students','dashboard','missions'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  $('tab-'+name).classList.add('active');
};

/* ── 제출 확인 ── */
function renderPending(){
  const pending=allSubs.filter(s=>s.status==='pending');
  if(!pending.length){$('pending-list').innerHTML='<p class="empty">검토할 제출이 없습니다 🎉</p>';return;}
  $('pending-list').innerHTML=pending.map(s=>{
    const m=missions.find(x=>x.id===s.missionId);
    return`<div class="card" id="sub-${s.id}">
      <div class="card-header">
        <div class="avatar">${(s.teamName||s.teamId||'?').slice(0,2)}</div>
        <div class="card-meta"><h3>${s.teamName||s.teamId} · ${s.displayName}</h3><p>${m?.title||s.missionId} · ${tsStr(s.createdAt)}</p></div>
        <span class="badge b-wait">대기중</span>
      </div>
      <img class="photo-box" src="${s.photoURL}" onclick="openPhoto('${s.photoURL}')">
      <div class="action-row">
        <button class="btn btn-success" onclick="approve('${s.id}')">🏆 도장 승인</button>
        <button class="btn btn-danger" onclick="toggleReject('${s.id}')">✕ 반려</button>
      </div>
      <div class="reject-section" id="rej-${s.id}">
        <textarea rows="2" placeholder="반려 사유 (선택 — 학생 화면에 표시됩니다)" id="rejmsg-${s.id}"></textarea>
        <button class="btn btn-danger" onclick="reject('${s.id}')">반려 전송</button>
      </div>
    </div>`;
  }).join('');
}

window.approve=async id=>{
  showLoading('승인 중...');
  await updateDoc(doc(db,'submissions',id),{status:'approved',reviewedAt:serverTimestamp()});
  hideLoading();toast('✅ 도장 승인 완료!');
};
window.toggleReject=id=>{const el=$('rej-'+id);el.style.display=el.style.display==='block'?'none':'block';};
window.reject=async id=>{
  const reason=$('rejmsg-'+id).value.trim();
  showLoading('반려 처리 중...');
  await updateDoc(doc(db,'submissions',id),{status:'rejected',rejectReason:reason||'',reviewedAt:serverTimestamp()});
  hideLoading();toast('반려 처리되었습니다');
};

/* ── 대시보드 ── */
function renderDashboard(){
  const approved=allSubs.filter(s=>s.status==='approved').length;
  const pending=allSubs.filter(s=>s.status==='pending').length;
  $('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-num">${students.length}</div><div class="stat-label">참여 학생</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${approved}</div><div class="stat-label">승인된 도장</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--gold)">${pending}</div><div class="stat-label">검토 대기</div></div>`;

  $('dash-thead').innerHTML=`<th>학생</th><th>모둠</th>`+missions.map(m=>`<th style="text-align:center">${m.icon||'📸'}</th>`).join('')+`<th style="text-align:center">도장</th>`;
  $('dash-tbody').innerHTML=students.map(st=>{
    const sSubs=allSubs.filter(s=>s.uid===st.id);
    const cells=missions.map(m=>{const sub=sSubs.find(s=>s.missionId===m.id);const ico={approved:'🏆',pending:'⏳',rejected:'✕'};return`<td class="cell-c">${ico[sub?.status]||'—'}</td>`;}).join('');
    const stamped=sSubs.filter(s=>s.status==='approved').length;
    return`<tr><td style="font-weight:700">${st.displayName}</td><td style="font-size:12px;color:rgba(26,26,46,.6)">${st.teamName||st.teamId||'-'}</td>${cells}<td class="cell-c" style="font-weight:700;color:var(--green)">${stamped}</td></tr>`;
  }).join('');
}

/* ── 학생 계정 관리 ── */
function renderStudentRows(){
  $('student-rows').innerHTML=students.length?students.map(s=>`
    <div class="student-row">
      <div class="avatar" style="font-size:11px">${(s.displayName||'?').slice(0,2)}</div>
      <div class="s-info">
        <div class="s-name">${s.displayName}</div>
        <div class="s-email">PIN: ${s.pin||'미설정'}</div>
        <span class="s-team">${s.teamName||s.teamId||'모둠 미배정'}</span>
      </div>
      <button class="btn btn-outline" onclick='openEditStudent(${JSON.stringify({id:s.id,displayName:s.displayName,email:s.email||"",teamId:s.teamId||"",teamName:s.teamName||""})})'>편집</button>
      <button class="btn btn-outline" style="color:var(--accent);border-color:var(--accent)" onclick="deleteStudent('${s.id}')">삭제</button>
    </div>`).join(''):'<p class="empty">등록된 학생이 없습니다</p>';
}

/* PIN 4자리 자동생성 (1000~9999) */
function genPIN(){ return String(Math.floor(Math.random()*9000)+1000); }

window.openStudentForm=()=>{
  const pin=genPIN();
  $('student-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✚ 학생 계정 추가</h4>
      <div class="form-row">
        <div class="field"><label>학생 이름</label><input id="sf-name" placeholder="홍길동"></div>
        <div class="field"><label>모둠</label>
          <select id="sf-team">
            <option value="">모둠 선택</option>
            ${teams.map(t=>`<option value="${t.id}" data-name="${t.displayName||t.code}">${t.displayName||t.code}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>PIN 번호 (4~6자리 숫자 — 직접 수정 가능)</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="sf-pin" type="text" inputmode="numeric"
                 value="${pin}" maxlength="6"
                 style="font-size:20px;font-weight:700;letter-spacing:4px;flex:1">
          <button class="btn btn-outline" style="white-space:nowrap"
                  onclick="document.getElementById('sf-pin').value=genPIN()">🔀 재생성</button>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="saveStudent()">계정 생성</button>
        <button class="btn btn-outline" onclick="$('student-form-wrap').innerHTML=''">취소</button>
      </div>
      <div class="pw-display" id="pw-display">
        <p>✅ 계정 생성 완료! 아래 정보를 학생에게 전달하세요.</p>
        <div class="pw-val" id="pw-display-val"></div>
      </div>
    </div>`;
};

window.openEditStudent=s=>{
  $('student-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✏️ 학생 정보 편집</h4>
      <div class="form-row">
        <div class="field"><label>학생 이름</label><input id="sf-name" value="${s.displayName}"></div>
        <div class="field"><label>모둠</label>
          <select id="sf-team">
            <option value="">모둠 없음</option>
            ${teams.map(t=>`<option value="${t.id}" data-name="${t.displayName||t.code}" ${s.teamId===t.id?'selected':''}>${t.displayName||t.code}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>PIN 번호 변경 (비워두면 현재 PIN 유지)</label>
        <input id="sf-pin" type="text" inputmode="numeric" placeholder="새 PIN (4~6자리 숫자)" maxlength="6"
               style="font-size:18px;font-weight:700;letter-spacing:3px">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="updateStudent('${s.id}')">저장</button>
        <button class="btn btn-outline" onclick="$('student-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.saveStudent=async()=>{
  const name=$('sf-name').value.trim();
  const pin=$('sf-pin').value.trim();
  const teamSel=$('sf-team');
  const teamId=teamSel.value;
  const teamName=teamSel.selectedOptions[0]?.dataset.name||'';
  if(!name){toast('이름을 입력하세요');return;}
  if(!pin||!/^\d{4,6}$/.test(pin)){toast('PIN은 숫자 4~6자리로 입력하세요');return;}
  /* 이름 → Firebase Auth 이메일 자동 변환
     예: 홍길동 → 홍길동@stepquest.app
     학생은 이 이메일을 알 필요 없음 */
  const email=encodeURIComponent(name)+'@stepquest.app';
  showLoading('계정 생성 중...');
  try{
    const createUser=httpsCallable(functions,'createStudentAccount');
    const result=await createUser({email,password:pin,displayName:name,teamId,teamName});
    const uid=result.data.uid;
    await addDoc(collection(db,'users'),{uid,displayName:name,email,pin,teamId,teamName,createdAt:serverTimestamp()});
    const sSnap=await getDocs(collection(db,'users'));
    students=sSnap.docs.map(d=>({id:d.id,...d.data()}));
    renderStudentRows();
    $('pw-display').style.display='block';
    $('pw-display-val').textContent=`이름: ${name}  /  PIN: ${pin}`;
    hideLoading();toast('✅ 계정 생성 완료!');
  }catch(e){
    hideLoading();
    if(e.code==='functions/not-found'||e.message?.includes('NOT_FOUND')){
      toast('⚠️ Functions 미설정 — Firebase 콘솔에서 직접 계정을 만들어 주세요');
    }else{toast('계정 생성 실패: '+e.message);}
    console.error(e);
  }
};

window.updateStudent=async id=>{
  const name=$('sf-name').value.trim();
  const pin=$('sf-pin').value.trim();
  const teamSel=$('sf-team');const teamId=teamSel.value;const teamName=teamSel.selectedOptions[0]?.dataset.name||'';
  if(!name){toast('이름을 입력하세요');return;}
  if(pin&&!/^\d{4,6}$/.test(pin)){toast('PIN은 숫자 4~6자리로 입력하세요');return;}
  showLoading();
  const updateData={displayName:name,teamId,teamName};
  if(pin) updateData.pin=pin; // PIN 입력 시에만 업데이트
  await updateDoc(doc(db,'users',id),updateData);
  const sSnap=await getDocs(collection(db,'users'));
  students=sSnap.docs.map(d=>({id:d.id,...d.data()}));
  $('student-form-wrap').innerHTML='';renderStudentRows();hideLoading();
  toast(pin?'✅ 저장되었습니다 (PIN 변경됨)':'✅ 저장되었습니다');
};

window.deleteStudent=async id=>{
  if(!confirm('학생 계정을 삭제할까요?'))return;
  showLoading();await deleteDoc(doc(db,'users',id));
  students=students.filter(s=>s.id!==id);renderStudentRows();hideLoading();toast('삭제되었습니다');
};

/* ── 미션 편집 ── */
function renderMissionRows(){
  $('mission-rows').innerHTML=missions.length?missions.map(m=>`
    <div class="me-row">
      <span class="me-icon">${m.icon||'📸'}</span>
      <div class="me-info"><div class="me-title">${m.title}</div><div class="me-sub">${m.teamOnly?'모둠 미션':'개인/모둠'} · ${m.active?'활성':'비활성'}</div></div>
      <button class="btn btn-outline" onclick='openMissionForm(${JSON.stringify({id:m.id,title:m.title,description:m.description||"",icon:m.icon||"📸",teamOnly:!!m.teamOnly,order:m.order,active:m.active!==false})})'>편집</button>
      <button class="btn btn-outline" style="color:var(--accent);border-color:var(--accent)" onclick="deleteMission('${m.id}')">삭제</button>
    </div>`).join(''):'<p class="empty">미션이 없습니다</p>';
}

window.openMissionForm=m=>{
  const isNew=!m;
  $('mission-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>${isNew?'✚ 새 미션 추가':'✏️ 미션 편집'}</h4>
      <div class="field"><label>미션 이름</label><input id="mf-title" value="${m?.title||''}"></div>
      <div class="field"><label>설명</label><textarea id="mf-desc" rows="2">${m?.description||''}</textarea></div>
      <div class="form-row">
        <div class="field"><label>이모지 아이콘</label><input id="mf-icon" value="${m?.icon||'📸'}" maxlength="2"></div>
        <div class="field"><label>순서</label><input id="mf-order" type="number" value="${m?.order||missions.length+1}"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>참여 단위</label><select id="mf-team"><option value="false" ${!m?.teamOnly?'selected':''}>개인/모둠 모두</option><option value="true" ${m?.teamOnly?'selected':''}>모둠 단위만</option></select></div>
        <div class="field"><label>상태</label><select id="mf-active"><option value="true" ${m?.active!==false?'selected':''}>활성</option><option value="false" ${m?.active===false?'selected':''}>비활성</option></select></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="saveMission('${m?.id||''}')">저장</button>
        <button class="btn btn-outline" onclick="$('mission-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.saveMission=async id=>{
  const data={title:$('mf-title').value.trim(),description:$('mf-desc').value.trim(),icon:$('mf-icon').value.trim()||'📸',order:parseInt($('mf-order').value)||99,teamOnly:$('mf-team').value==='true',active:$('mf-active').value==='true'};
  if(!data.title){toast('미션 이름을 입력하세요');return;}
  showLoading('저장 중...');
  if(id)await updateDoc(doc(db,'missions',id),data);
  else await addDoc(collection(db,'missions'),data);
  const mSnap=await getDocs(query(collection(db,'missions'),orderBy('order')));
  missions=mSnap.docs.map(d=>({id:d.id,...d.data()}));
  $('mission-form-wrap').innerHTML='';renderMissionRows();hideLoading();toast('✅ 저장되었습니다');
};

window.deleteMission=async id=>{
  if(!confirm('미션을 삭제할까요?'))return;
  showLoading();await deleteDoc(doc(db,'missions',id));
  missions=missions.filter(m=>m.id!==id);renderMissionRows();hideLoading();toast('삭제되었습니다');
};

/* ── 관리자 로그아웃 ── */
window.adminLogout=async()=>{
  await signOut(auth);
  $('screen-admin-main').classList.remove('active');
  $('screen-admin-login').classList.add('active');
  $('admin-email').value='';$('admin-pw').value='';
};

window.openPhoto=url=>{$('modal-img').src=url;$('photo-modal').classList.add('show');};
window.closePhoto=()=>$('photo-modal').classList.remove('show');
window.$=$;
</script>
