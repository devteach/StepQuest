<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepQuest 관리자</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a2e;--paper:#faf8f2;--paper2:#f0ede3;--accent:#c8392b;--accent2:#2e6da4;--gold:#c9841a;--green:#2d7a4f;--border:rgba(26,26,46,0.15);--fh:'Gowun Dodum',serif;--fb:'Noto Sans KR',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--fb);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(26,26,46,.06) 39px,rgba(26,26,46,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(26,26,46,.06) 39px,rgba(26,26,46,.06) 40px)}
  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:16px}
  .app-header{text-align:center;padding:24px 0 18px;border-bottom:2px solid var(--ink);margin-bottom:20px}
  .app-header h1{font-family:var(--fh);font-size:20px}
  .app-header .sub{font-size:12px;color:rgba(26,26,46,.5);margin-top:4px}
  .tabs{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
  .tab-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:700;font-family:var(--fb);border:none;background:transparent;cursor:pointer;color:rgba(26,26,46,.45);border-right:1px solid var(--border);transition:background .15s,color .15s}
  .tab-btn:last-child{border-right:none}
  .tab-btn.active{background:var(--ink);color:var(--paper)}
  .card{background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
  .card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .card-meta h3{font-size:14px;font-weight:700;margin-bottom:2px}
  .card-meta p{font-size:12px;color:rgba(26,26,46,.55)}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .b-wait{background:#fff3cd;color:#7d5a00}
  .b-ok{background:#d4edda;color:#1a5c2a}
  .b-rej{background:#fde8e8;color:#8b1a1a}
  .photo-box{width:100%;border-radius:8px;aspect-ratio:4/3;object-fit:cover;background:var(--paper2);border:1px solid var(--border);display:block;cursor:pointer}
  .action-row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--fb);cursor:pointer;transition:opacity .15s}
  .btn:active{opacity:.8}
  .btn-success{background:var(--green);color:#fff}
  .btn-danger{background:var(--accent);color:#fff}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);flex:unset;padding:7px 14px;font-size:12px}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .reject-section{display:none;margin-top:10px}
  .reject-section textarea{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);background:var(--paper);color:var(--ink);resize:none}
  .reject-section button{margin-top:8px;width:100%}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .stat{background:var(--paper2);border-radius:10px;padding:14px 10px;text-align:center}
  .stat-num{font-size:28px;font-weight:700}
  .stat-label{font-size:11px;color:rgba(26,26,46,.5);margin-top:3px}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:10px;text-align:left;font-weight:700;font-size:11px;color:rgba(26,26,46,.5);border-bottom:1.5px solid var(--border);letter-spacing:.5px}
  td{padding:10px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  .cell-c{text-align:center;font-size:15px}
  .list-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .list-row:last-child{border-bottom:none}
  .row-icon{font-size:20px}
  .row-info{flex:1}
  .row-title{font-size:14px;font-weight:700}
  .row-sub{font-size:11px;color:rgba(26,26,46,.5);margin-top:2px}
  .form-card{background:#eef3fb;border:1.5px solid var(--accent2);border-radius:12px;padding:16px;margin-bottom:12px}
  .form-card h4{font-size:14px;color:var(--accent2);margin-bottom:14px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:.5px}
  .field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);background:var(--paper);color:var(--ink)}
  .field textarea{resize:vertical}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-actions{display:flex;gap:8px;margin-top:12px}
  .s-tag{font-size:11px;background:#e8f0fb;color:var(--accent2);padding:2px 8px;border-radius:12px;display:inline-block;margin-top:3px}
  .login-wrap{max-width:360px;margin:60px auto 0}
  .login-wrap h2{font-family:var(--fh);font-size:18px;text-align:center;margin-bottom:20px}
  .login-wrap .field label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;color:rgba(26,26,46,.6)}
  .login-wrap input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--paper);color:var(--ink);font-family:var(--fb);margin-bottom:0}
  .login-wrap input:focus{outline:none;border-color:var(--ink)}
  .err{font-size:12px;color:var(--accent);text-align:center;min-height:18px;margin-top:6px}
  .loading{position:fixed;inset:0;z-index:100;background:rgba(250,248,242,.88);display:none;align-items:center;justify-content:center;font-size:14px;gap:10px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:32px;font-size:14px;color:rgba(26,26,46,.4)}
  .screen{display:none}
  .screen.active{display:block}
  .tab-pane{display:none}
  .tab-pane.active{display:block}
  .photo-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:20px}
  .photo-modal.show{display:flex}
  .photo-modal img{max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain}
  .photo-modal .close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer}
  .pw-box{background:#fff8e6;border:1.5px solid var(--gold);border-radius:8px;padding:12px 16px;margin-top:12px;display:none}
  .pw-box p{font-size:12px;color:rgba(26,26,46,.6);margin-bottom:4px}
  .pw-box .pw-val{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--ink)}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <span style="font-size:36px;display:block;margin-bottom:6px">📋</span>
    <h1>StepQuest 관리자</h1>
    <p class="sub">선생님 전용 페이지</p>
  </header>

  <!-- 로그인 -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <h2>🔐 관리자 로그인</h2>
      <div class="field">
        <label>이메일</label>
        <input id="admin-email" type="email" placeholder="teacher@school.kr" autocomplete="email">
      </div>
      <div class="field" style="margin-top:10px">
        <label>비밀번호</label>
        <input id="admin-pw" type="password" placeholder="비밀번호"
               onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <p class="err" id="admin-err"></p>
      <button class="btn btn-primary" style="width:100%;padding:13px;margin-top:8px" onclick="adminLogin()">로그인</button>
    </div>
  </div>

  <!-- 관리자 메인 -->
  <div id="screen-main" class="screen">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('review')">📷 제출</button>
      <button class="tab-btn" onclick="switchTab('students')">👤 학생</button>
      <button class="tab-btn" onclick="switchTab('missions')">🎯 미션</button>
      <button class="tab-btn" onclick="switchTab('dashboard')">📊 현황</button>
    </div>
    <div style="text-align:right;margin-bottom:12px">
      <button class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="adminLogout()">로그아웃</button>
    </div>

    <!-- 제출 확인 -->
    <div id="tab-review" class="tab-pane active">
      <div id="pending-list"><p class="empty">불러오는 중...</p></div>
    </div>

    <!-- 학생 계정 -->
    <div id="tab-students" class="tab-pane">
      <div id="student-form-wrap"></div>
      <div class="card" style="padding:0;overflow:hidden"><div id="student-rows"><p class="empty">불러오는 중...</p></div></div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;padding:13px" onclick="openStudentForm()">+ 학생 추가</button>
    </div>

    <!-- 미션 편집 -->
    <div id="tab-missions" class="tab-pane">
      <div id="mission-form-wrap"></div>
      <div class="card" style="padding:0;overflow:hidden"><div id="mission-rows"><p class="empty">불러오는 중...</p></div></div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;padding:13px" onclick="openMissionForm(null)">+ 미션 추가</button>
    </div>

    <!-- 현황 대시보드 -->
    <div id="tab-dashboard" class="tab-pane">
      <div class="stats-grid" id="dash-stats"></div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="tbl-wrap"><table><thead><tr id="dash-thead"></tr></thead><tbody id="dash-tbody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><span id="lmsg">잠시만요...</span></div>
<div class="toast" id="toast"></div>
<div class="photo-modal" id="photo-modal" onclick="closePhoto()">
  <span class="close">✕</span><img id="modal-img" src="">
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* ── 설정 ── */
const SUPABASE_URL = 'https://riomypiymsssaevfhmks.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpb215cGl5bXNzc2FldmZobWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzc5MTEsImV4cCI6MjA5Mjc1MzkxMX0.am6PrXOvnqLt4APZI49Yw6hoAZxdMQr6YRD7ujV12RE';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);


/* ── 상태 ── */
let missions=[], students=[], teams=[], allSubs=[];
let realtimeSub = null;

/* ── UI 헬퍼 ── */
const $ = id => document.getElementById(id);
const showLoading = (m='') => { $('loading').style.display='flex'; $('lmsg').textContent=m||'잠시만요...'; };
const hideLoading = () => $('loading').style.display='none';
const toast = (msg,d=2400) => {
  const e=$('toast'); e.textContent=msg; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),d);
};
const tsStr = ts => ts ? new Date(ts).toLocaleString('ko',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
const unitLabel = { individual:'개인', team:'모둠', class:'학급' };
function genPIN() { return String(Math.floor(Math.random()*9000)+1000); }

/* ── Auth 상태 감시 ── */
/* 앱 시작 시 기존 세션 확인 */
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const { data } = await supabase.from('admins').select('id').eq('id', session.user.id).single();
    if (data) {
      $('screen-login').classList.remove('active');
      $('screen-main').classList.add('active');
      loadAdmin();
    } else {
      await supabase.auth.signOut();
      $('admin-err').textContent = '관리자 권한이 없는 계정이에요.';
    }
  }
})();

/* 로그인/로그아웃 상태 변화 감지 */
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    const { data } = await supabase.from('admins').select('id').eq('id', session.user.id).single();
    if (data) {
      $('screen-login').classList.remove('active');
      $('screen-main').classList.add('active');
      loadAdmin();
    } else {
      await supabase.auth.signOut();
      $('admin-err').textContent = '관리자 권한이 없는 계정이에요.';
    }
  } else if (event === 'SIGNED_OUT') {
    $('screen-main').classList.remove('active');
    $('screen-login').classList.add('active');
  }
});

/* ── 로그인 ── */
window.adminLogin = async () => {
  const email = $('admin-email').value.trim();
  const pw    = $('admin-pw').value;
  $('admin-err').textContent = '';
  if (!email||!pw) { $('admin-err').textContent='이메일과 비밀번호를 입력해 주세요.'; return; }
  showLoading('로그인 중...');
  const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
  if (error) {
    hideLoading();
    $('admin-err').textContent = error.message==='Invalid login credentials'
      ? '이메일 또는 비밀번호를 확인해 주세요.'
      : '로그인 실패. 다시 시도해 주세요.';
  }
};

/* ── 데이터 로드 ── */
async function loadAdmin() {
  showLoading('데이터 불러오는 중...');
  try {
    const [mRes, sRes, tRes] = await Promise.all([
      supabase.from('missions').select('*').order('sort_order'),
      supabase.from('users').select('*, teams(name)'),
      supabase.from('teams').select('*').order('name')
    ]);
    missions = mRes.data||[];
    students = sRes.data||[];
    teams    = tRes.data||[];

    renderStudentRows();
    renderMissionRows();

    /* 실시간 구독 */
    if (realtimeSub) supabase.removeChannel(realtimeSub);
    realtimeSub = supabase
      .channel('admin-subs')
      .on('postgres_changes',{ event:'*', schema:'public', table:'submissions' }, loadAllSubs)
      .subscribe();

    await loadAllSubs();
    hideLoading();
  } catch(e) { hideLoading(); toast('불러오기 실패'); console.error(e); }
}

async function loadAllSubs() {
  const { data } = await supabase
    .from('submissions')
    .select('*, users(name, team_id), missions(title)')
    .order('created_at', { ascending:false });
  allSubs = (data||[]).map(s => ({
    ...s,
    teamName: teams.find(t => t.id===s.users?.team_id)?.name || '-'
  }));
  renderPending();
  renderDashboard();
}

/* ── 탭 전환 ── */
window.switchTab = name => {
  const names = ['review','students','missions','dashboard'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  $('tab-'+name).classList.add('active');
};

/* ══════════════════════════════════════════
   제출 확인
   ══════════════════════════════════════════ */
function renderPending() {
  const pending = allSubs.filter(s => s.status==='pending');
  if (!pending.length) { $('pending-list').innerHTML='<p class="empty">검토할 제출이 없습니다 🎉</p>'; return; }
  $('pending-list').innerHTML = pending.map(s => `
    <div class="card" id="sub-${s.id}">
      <div class="card-header">
        <div class="avatar">${(s.teamName||'-').slice(0,2)}</div>
        <div class="card-meta">
          <h3>${s.teamName} · ${s.users?.name||'-'}</h3>
          <p>${s.missions?.title||'-'} · ${tsStr(s.created_at)}</p>
        </div>
        <span class="badge b-wait">대기중</span>
      </div>
      <img class="photo-box" src="${s.photo_url}" onclick="openPhoto('${s.photo_url}')">
      <div class="action-row">
        <button class="btn btn-success" onclick="approve('${s.id}')">🏆 도장 승인</button>
        <button class="btn btn-danger"  onclick="toggleReject('${s.id}')">✕ 반려</button>
      </div>
      <div class="reject-section" id="rej-${s.id}">
        <textarea rows="2" placeholder="반려 사유 (선택 — 학생 화면에 표시됩니다)" id="rejmsg-${s.id}"></textarea>
        <button class="btn btn-danger" onclick="reject('${s.id}')">반려 전송</button>
      </div>
    </div>`).join('');
}

window.approve = async id => {
  showLoading('승인 중...');
  await supabase.from('submissions').update({ status:'approved', reviewed_at:new Date().toISOString() }).eq('id',id);
  hideLoading(); toast('✅ 도장 승인 완료!');
};
window.toggleReject = id => {
  const el=$('rej-'+id); el.style.display=el.style.display==='block'?'none':'block';
};
window.reject = async id => {
  const reason=$('rejmsg-'+id).value.trim();
  showLoading('반려 처리 중...');
  await supabase.from('submissions').update({ status:'rejected', reject_reason:reason||'', reviewed_at:new Date().toISOString() }).eq('id',id);
  hideLoading(); toast('반려 처리되었습니다');
};

/* ══════════════════════════════════════════
   현황 대시보드
   ══════════════════════════════════════════ */
function renderDashboard() {
  const approved = allSubs.filter(s=>s.status==='approved').length;
  const pending  = allSubs.filter(s=>s.status==='pending').length;
  $('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-num">${students.length}</div><div class="stat-label">참여 학생</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${approved}</div><div class="stat-label">승인된 도장</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--gold)">${pending}</div><div class="stat-label">검토 대기</div></div>`;

  $('dash-thead').innerHTML=`<th>학생</th><th>모둠</th>`+
    missions.map(m=>`<th style="text-align:center">${m.icon||'📸'}</th>`).join('')+
    `<th style="text-align:center">도장</th>`;

  $('dash-tbody').innerHTML=students.map(st=>{
    const sSubs=allSubs.filter(s=>s.uid===st.id);
    const cells=missions.map(m=>{
      const sub=sSubs.find(s=>s.mission_id===m.id);
      const ico={approved:'🏆',pending:'⏳',rejected:'✕'};
      return`<td class="cell-c">${ico[sub?.status]||'—'}</td>`;
    }).join('');
    const stamped=sSubs.filter(s=>s.status==='approved').length;
    return`<tr>
      <td style="font-weight:700">${st.name}</td>
      <td style="font-size:12px;color:rgba(26,26,46,.6)">${st.teams?.name||'-'}</td>
      ${cells}
      <td class="cell-c" style="font-weight:700;color:var(--green)">${stamped}</td>
    </tr>`;
  }).join('');
}

/* ══════════════════════════════════════════
   학생 계정 관리
   ══════════════════════════════════════════ */
function renderStudentRows() {
  $('student-rows').innerHTML = students.length ? students.map(s=>`
    <div class="list-row">
      <div class="avatar" style="font-size:11px">${(s.name||'?').slice(0,2)}</div>
      <div class="row-info">
        <div class="row-title">${s.name}</div>
        <div class="row-sub">PIN: ${s.pin||'미설정'}</div>
        <span class="s-tag">${s.teams?.name||'모둠 미배정'}</span>
      </div>
      <button class="btn btn-outline" onclick='openEditStudent(${JSON.stringify({id:s.id,name:s.name,pin:s.pin||"",team_id:s.team_id||""})})'>편집</button>
      <button class="btn btn-outline" style="color:var(--accent);border-color:var(--accent)" onclick="deleteStudent('${s.id}')">삭제</button>
    </div>`).join('') : '<p class="empty">등록된 학생이 없습니다</p>';
}

window.openStudentForm = () => {
  const pin = genPIN();
  $('student-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✚ 학생 추가</h4>
      <div class="form-row">
        <div class="field"><label>학생 이름</label><input id="sf-name" placeholder="홍길동"></div>
        <div class="field"><label>모둠</label>
          <select id="sf-team">
            <option value="">모둠 선택</option>
            ${teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>PIN 번호</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="sf-pin" type="text" inputmode="numeric" value="${pin}" maxlength="6"
                 style="font-size:20px;font-weight:700;letter-spacing:4px;flex:1">
          <button class="btn btn-outline" style="white-space:nowrap" onclick="document.getElementById('sf-pin').value=genPIN()">🔀 재생성</button>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="saveStudent()">계정 생성</button>
        <button class="btn btn-outline" onclick="$('student-form-wrap').innerHTML=''">취소</button>
      </div>
      <div class="pw-box" id="pw-box">
        <p>✅ 아래 정보를 학생에게 전달하세요.</p>
        <div class="pw-val" id="pw-val"></div>
      </div>
    </div>`;
};

window.saveStudent = async () => {
  const name    = $('sf-name').value.trim();
  const pin     = $('sf-pin').value.trim();
  const team_id = $('sf-team').value || null;
  if (!name) { toast('이름을 입력하세요'); return; }
  if (!pin||!/^\d{4,6}$/.test(pin)) { toast('PIN은 숫자 4~6자리로 입력하세요'); return; }

  const email = encodeURIComponent(name)+'@stepquest.app';
  showLoading('계정 생성 중...');
  try {
    const { data:authData, error:authErr } = await supabase.auth.signUp({ email, password:pin });
    if (authErr) throw authErr;

    const { error:profileErr } = await supabase.from('users').insert({
      id: authData.user.id, name, pin, team_id
    });
    if (profileErr) throw profileErr;

    const { data:sData } = await supabase.from('users').select('*, teams(name)');
    students = sData||[];
    renderStudentRows();
    $('pw-box').style.display='block';
    $('pw-val').textContent=`이름: ${name}  /  PIN: ${pin}`;
    hideLoading(); toast('✅ 계정 생성 완료!');
  } catch(e) {
    hideLoading(); toast('계정 생성 실패: '+e.message); console.error(e);
  }
};

window.openEditStudent = s => {
  $('student-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✏️ 학생 편집</h4>
      <div class="form-row">
        <div class="field"><label>이름</label><input id="sf-name" value="${s.name}"></div>
        <div class="field"><label>모둠</label>
          <select id="sf-team">
            <option value="">모둠 없음</option>
            ${teams.map(t=>`<option value="${t.id}" ${s.team_id===t.id?'selected':''}>${t.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>PIN 변경 (비워두면 유지)</label>
        <input id="sf-pin" type="text" inputmode="numeric" placeholder="새 PIN (4~6자리)" maxlength="6" style="font-size:18px;font-weight:700;letter-spacing:3px">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="updateStudent('${s.id}')">저장</button>
        <button class="btn btn-outline" onclick="$('student-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.updateStudent = async id => {
  const name=$('sf-name').value.trim(), pin=$('sf-pin').value.trim();
  const team_id=$('sf-team').value||null;
  if (!name) { toast('이름을 입력하세요'); return; }
  if (pin&&!/^\d{4,6}$/.test(pin)) { toast('PIN은 숫자 4~6자리로 입력하세요'); return; }
  showLoading();
  const upd={name, team_id}; if (pin) upd.pin=pin;
  await supabase.from('users').update(upd).eq('id',id);
  const { data:sData } = await supabase.from('users').select('*, teams(name)');
  students=sData||[];
  $('student-form-wrap').innerHTML='';
  renderStudentRows(); hideLoading();
  toast(pin?'✅ 저장 (PIN 변경됨)':'✅ 저장되었습니다');
};

window.deleteStudent = async id => {
  if (!confirm('학생 계정을 삭제할까요?')) return;
  showLoading();
  await supabase.from('users').delete().eq('id',id);
  students=students.filter(s=>s.id!==id);
  renderStudentRows(); hideLoading(); toast('삭제되었습니다');
};

/* ══════════════════════════════════════════
   모둠 관리
   ══════════════════════════════════════════ */
function renderTeamRows() {
  $('team-rows').innerHTML = teams.length ? teams.map(t=>`
    <div class="list-row">
      <div class="avatar" style="font-size:11px">${t.name.slice(0,2)}</div>
      <div class="row-info"><div class="row-title">${t.name}</div></div>
      <button class="btn btn-outline" onclick='openEditTeam(${JSON.stringify({id:t.id,name:t.name})})'>편집</button>
      <button class="btn btn-outline" style="color:var(--accent);border-color:var(--accent)" onclick="deleteTeam('${t.id}')">삭제</button>
    </div>`).join('') : '<p class="empty">등록된 모둠이 없습니다</p>';
}

window.openTeamForm = () => {
  $('team-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✚ 모둠 추가</h4>
      <div class="field"><label>모둠 이름</label><input id="tf-name" placeholder="예: 1모둠"></div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="saveTeam()">추가</button>
        <button class="btn btn-outline" onclick="$('team-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.saveTeam = async () => {
  const name=$('tf-name').value.trim();
  if (!name) { toast('모둠 이름을 입력하세요'); return; }
  showLoading();
  await supabase.from('teams').insert({ name });
  const { data:tData } = await supabase.from('teams').select('*').order('name');
  teams=tData||[];
  $('team-form-wrap').innerHTML='';
  renderTeamRows(); hideLoading(); toast('✅ 모둠 추가 완료!');
};

window.openEditTeam = t => {
  $('team-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>✏️ 모둠 편집</h4>
      <div class="field"><label>모둠 이름</label><input id="tf-name" value="${t.name}"></div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="updateTeam('${t.id}')">저장</button>
        <button class="btn btn-outline" onclick="$('team-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.updateTeam = async id => {
  const name=$('tf-name').value.trim();
  if (!name) { toast('모둠 이름을 입력하세요'); return; }
  showLoading();
  await supabase.from('teams').update({ name }).eq('id',id);
  const { data:tData } = await supabase.from('teams').select('*').order('name');
  teams=tData||[];
  $('team-form-wrap').innerHTML='';
  renderTeamRows(); hideLoading(); toast('✅ 저장되었습니다');
};

window.deleteTeam = async id => {
  if (!confirm('모둠을 삭제할까요?\n소속 학생의 모둠 정보가 초기화됩니다.')) return;
  showLoading();
  await supabase.from('teams').delete().eq('id',id);
  teams=teams.filter(t=>t.id!==id);
  renderTeamRows(); hideLoading(); toast('삭제되었습니다');
};

/* ══════════════════════════════════════════
   미션 편집
   ══════════════════════════════════════════ */
function renderMissionRows() {
  $('mission-rows').innerHTML = missions.length ? missions.map(m=>`
    <div class="list-row">
      <span class="row-icon">${m.icon||'📸'}</span>
      <div class="row-info">
        <div class="row-title">${m.title}</div>
        <div class="row-sub">${unitLabel[m.unit]||'개인'} 미션 · ${m.active?'활성':'비활성'}</div>
      </div>
      <button class="btn btn-outline" onclick='openMissionForm(${JSON.stringify({id:m.id,title:m.title,description:m.description||"",icon:m.icon||"📸",unit:m.unit||"individual",sort_order:m.sort_order,active:m.active!==false})})'>편집</button>
      <button class="btn btn-outline" style="color:var(--accent);border-color:var(--accent)" onclick="deleteMission('${m.id}')">삭제</button>
    </div>`).join('') : '<p class="empty">미션이 없습니다</p>';
}

window.openMissionForm = m => {
  const isNew=!m;
  $('mission-form-wrap').innerHTML=`
    <div class="form-card">
      <h4>${isNew?'✚ 미션 추가':'✏️ 미션 편집'}</h4>
      <div class="field"><label>미션 이름</label><input id="mf-title" value="${m?.title||''}"></div>
      <div class="field"><label>설명</label><textarea id="mf-desc" rows="2">${m?.description||''}</textarea></div>
      <div class="form-row">
        <div class="field"><label>이모지 아이콘</label><input id="mf-icon" value="${m?.icon||'📸'}" maxlength="2"></div>
        <div class="field"><label>순서</label><input id="mf-order" type="number" value="${m?.sort_order||missions.length+1}"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>참여 단위</label>
          <select id="mf-unit">
            <option value="individual" ${m?.unit==='individual'||!m?'selected':''}>개인</option>
            <option value="team"       ${m?.unit==='team'      ?'selected':''}>모둠</option>
            <option value="class"      ${m?.unit==='class'     ?'selected':''}>학급</option>
          </select>
        </div>
        <div class="field"><label>상태</label>
          <select id="mf-active">
            <option value="true"  ${m?.active!==false?'selected':''}>활성</option>
            <option value="false" ${m?.active===false ?'selected':''}>비활성</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" style="flex:1" onclick="saveMission('${m?.id||''}')">저장</button>
        <button class="btn btn-outline" onclick="$('mission-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};

window.saveMission = async id => {
  const data={
    title:$('mf-title').value.trim(), description:$('mf-desc').value.trim(),
    icon:$('mf-icon').value.trim()||'📸', sort_order:parseInt($('mf-order').value)||99,
    unit:$('mf-unit').value, active:$('mf-active').value==='true'
  };
  if (!data.title) { toast('미션 이름을 입력하세요'); return; }
  showLoading('저장 중...');
  if (id) await supabase.from('missions').update(data).eq('id',id);
  else    await supabase.from('missions').insert(data);
  const { data:mData } = await supabase.from('missions').select('*').order('sort_order');
  missions=mData||[];
  $('mission-form-wrap').innerHTML='';
  renderMissionRows(); hideLoading(); toast('✅ 저장되었습니다');
};

window.deleteMission = async id => {
  if (!confirm('미션을 삭제할까요?')) return;
  showLoading();
  await supabase.from('missions').delete().eq('id',id);
  missions=missions.filter(m=>m.id!==id);
  renderMissionRows(); hideLoading(); toast('삭제되었습니다');
};

/* ── 로그아웃 ── */
window.adminLogout = async () => {
  if (realtimeSub) { supabase.removeChannel(realtimeSub); realtimeSub=null; }
  await supabase.auth.signOut();
  $('screen-main').classList.remove('active');
  $('screen-login').classList.add('active');
  $('admin-email').value=''; $('admin-pw').value='';
};

/* ── 사진 모달 ── */
window.openPhoto  = url => { $('modal-img').src=url; $('photo-modal').classList.add('show'); };
window.closePhoto = ()  => $('photo-modal').classList.remove('show');
window.$=$;
</script>
